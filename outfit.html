<!DOCTYPE html>
<html>

<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Outfit - StitchVale</title>

  <style>
    body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0d0d0d;
  color: white;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 30px;
  background: black;
  border-bottom: 1px solid #222;
}

.logo img {
  height: 80px;
}

nav a {
  color: #aaa;
  margin-left: 20px;
  text-decoration: none;
}

nav a:hover {
  color: white;
}

.hero {
  text-align: center;
  padding: 60px 20px;
}

.hero h1 {
  font-size: 42px;
}

.hero p {
  color: #aaa;
}

.ai-box {
  max-width: 700px;
  margin: 30px auto;
  background: #1a1a1a;
  padding: 25px;
  border-radius: 20px;
}

textarea {
  width: 100%;
  height: 120px;
  box-sizing: border-box;
  padding: 15px;
  border-radius: 12px;
  border: none;
  resize: vertical;
  font-family: Arial;
}

button {
  margin-top: 15px;
  padding: 12px 20px;
  border-radius: 30px;
  border: none;
  background: white;
  color: black;
  cursor: pointer;
  font-weight: bold;
}

.section {
  padding: 40px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px,1fr));
  gap: 25px;
}

.card {
  background: #1a1a1a;
  border-radius: 12px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 260px;
  object-fit: cover;
}

.card-info {
  padding: 15px;
}

.description {
  color: #aaa;
  font-size: 14px;
}

.price {
  font-weight: bold;
}

footer {
  margin-top: 40px;
  padding: 30px;
  text-align: center;
  border-top: 1px solid #222;
  color: #aaa;
}
  </style>

  
</head>
<body>
  <header>
  <div class="logo">
    <a href="index.html">
      <img src="logo3.jpg" alt="StitchVale Logo">
    </a>
  </div>

  <nav>
    <a href="novita.html">Novità</a>
    <a href="brand.html">Brand</a>
    <a href="account.html">Account</a>
    <a href="catalogo.html">Catalogo</a>
    <a href="idee.html">Idee</a>
    <a href="outfit.html">AI Outfit</a>
  </nav>
</header>

<section class="hero">
  <h1>AI Outfit</h1>
  <p>Descrivi lo stile che cerchi e StitchVale ti suggerirà prodotti compatibili.</p>

  <div class="ai-box">
    <textarea id="outfitPrompt" placeholder="Esempio: voglio un outfit streetwear nero oversize con felpa, pantaloni cargo e accessori..."></textarea>
    <button onclick="generateOutfit()">Genera outfit</button>
  </div>

  <p id="resultText"></p>
</section>

<section class="section">
  <h2>Prodotti consigliati</h2>
  <div id="outfitResults" class="grid"></div>
</section>

<footer>
  <h3>StitchVale</h3>
  <p>Email: stitchvale1@gmail.com</p>
  <p>Instagram: @stitchvale</p>
</footer>

  <script>
    const API_URL = "http://localhost:3000";

async function generateOutfit() {
  const prompt = document.getElementById("outfitPrompt").value.toLowerCase();

  if (!prompt) {
    alert("Descrivi l'outfit che stai cercando");
    return;
  }

  const res = await fetch(API_URL + "/products");
  const products = await res.json();

  const words = prompt
    .split(" ")
    .filter(word => word.length > 2);

  const scored = products.map(product => {
    const text = (
      product.name + " " +
      product.brand + " " +
      product.category + " " +
      (product.description || "")
    ).toLowerCase();

    let score = 0;

    words.forEach(word => {
      if (text.includes(word)) {
        score++;
      }
    });

    return {
      product,
      score
    };
  });

  let results = scored
    .filter(item => item.score > 0)
    .sort((a, b) => b.score - a.score)
    .map(item => item.product);

  if (results.length === 0) {
    document.getElementById("resultText").innerText =
      "Non ho trovato prodotti adatti. Prova con parole più semplici.";
    document.getElementById("outfitResults").innerHTML = "";
    return;
  }

  results = results.slice(0, 6);

  document.getElementById("resultText").innerText =
    "Ho trovato " + results.length + " prodotti adatti al tuo outfit.";

  document.getElementById("outfitResults").innerHTML = results.map(p => `
    <div class="card">
      ${p.image ? `<img src="${API_URL}/uploads/${p.image}">` : ""}

      <div class="card-info">
        <h3>${p.name}</h3>
        <p>Brand: ${p.brand}</p>
        <p>Categoria: ${p.category}</p>
        <p class="description">${p.description || ""}</p>
        <p class="price">€${p.price}</p>
        <button onclick='addToCart(${JSON.stringify(p)})'>Aggiungi al carrello</button>
      </div>
    </div>
  `).join("");
}

function getCart() {
  return JSON.parse(localStorage.getItem("cart")) || [];
}

function saveCart(cart) {
  localStorage.setItem("cart", JSON.stringify(cart));
}

function addToCart(product) {
  const cart = getCart();
  const existing = cart.find(item => item.id === product.id);

  if (existing) {
    existing.quantity++;
  } else {
    cart.push({...product, quantity: 1});
  }

  saveCart(cart);
  alert("Prodotto aggiunto al carrello");
}
  </script>
</body>
</html>
