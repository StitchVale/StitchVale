<!DOCTYPE html>
<html>

<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Brand - StitchVale</title>

  <style>
    body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0d0d0d;
  color: white;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 30px;
  background: black;
  border-bottom: 1px solid #222;
}

.logo img {
  height: 80px;
}

nav a {
  color: #aaa;
  margin-left: 20px;
  text-decoration: none;
}

nav a:hover {
  color: white;
}

.brand-hero {
  text-align: center;
  padding: 70px 20px;
  background: linear-gradient(135deg, #111, #1f1f1f, #000);
  border-bottom: 1px solid #222;
}

.brand-logo {
  width: 130px;
  height: 130px;
  object-fit: cover;
  border-radius: 50%;
  background: #222;
  margin-bottom: 20px;
}

.brand-hero h1 {
  font-size: 44px;
  margin: 10px 0;
}

.brand-hero p {
  color: #aaa;
  max-width: 700px;
  margin: 15px auto;
  line-height: 1.6;
}

.section {
  padding: 40px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 25px;
}

.card {
  background: #1a1a1a;
  border-radius: 10px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 260px;
  object-fit: cover;
}

.card-info {
  padding: 15px;
}

.card-info h3 a {
  color: white;
  text-decoration: none;
}

.description {
  color: #aaa;
  font-size: 14px;
  line-height: 1.4;
}

.price {
  font-weight: bold;
}

footer {
  padding: 30px;
  text-align: center;
  border-top: 1px solid #222;
  color: #aaa;
}
  </style>

  
</head>
<body>
  <header>
  <div class="logo">
    <a href="index.html">
      <img src="logo3.jpg" alt="StitchVale Logo">
    </a>
  </div>

  <nav>
    <a href="novita.html">Novità</a>
    <a href="brand.html">Brand</a>
    <a href="account.html">Account</a>
    <a href="catalogo.html">Catalogo</a>
    <a href="idee.html">Idee</a>
    <a href="outfit.html">AI Outfit</a>
  </nav>
</header>

<section class="brand-hero" id="brandHero">
  <h1>Brand</h1>
  <p>Caricamento profilo brand...</p>
</section>

<section class="section">
  <h2>Prodotti del brand</h2>
  <div id="brandProducts" class="grid"></div>
</section>

<footer>
  <h3>StitchVale</h3>
  <p>Email: stitchvale1@gmail.com</p>
  <p>Instagram: @stitchvale</p>
</footer>

  <script>
    const API_URL = "http://localhost:3000";

function getBrandName() {
  const params = new URLSearchParams(window.location.search);
  return params.get("brand");
}

async function loadBrandPage() {
  const brandName = getBrandName();

  if (!brandName) {
    document.getElementById("brandHero").innerHTML = `
      <h1>Brand non trovato</h1>
      <p>Torna al catalogo e seleziona un brand.</p>
    `;
    return;
  }

  const brandsRes = await fetch(API_URL + "/brands");
  const brands = await brandsRes.json();

  const productsRes = await fetch(API_URL + "/products");
  const products = await productsRes.json();

  const brandProfile = brands.find(b =>
    String(b.name).toLowerCase() === String(brandName).toLowerCase()
  );

  const brandProducts = products.filter(p =>
    String(p.brand).toLowerCase() === String(brandName).toLowerCase()
  );

  document.title = brandName + " - StitchVale";

  if (brandProfile) {
    document.getElementById("brandHero").innerHTML = `
      ${brandProfile.logo ? `<img class="brand-logo" src="${API_URL}/uploads/${brandProfile.logo}" alt="${brandProfile.name}">` : ""}
      <h1>${brandProfile.name}</h1>
      <p>${brandProfile.bio || "Nessuna descrizione disponibile."}</p>
    `;
  } else {
    document.getElementById("brandHero").innerHTML = `
      <h1>${brandName}</h1>
      <p>Questo brand non ha ancora completato il profilo.</p>
    `;
  }

  if (brandProducts.length === 0) {
    document.getElementById("brandProducts").innerHTML =
      "<p>Nessun prodotto trovato per questo brand.</p>";
    return;
  }

  document.getElementById("brandProducts").innerHTML = brandProducts.map(p => `
    <div class="card">
      ${p.image ? `<img src="${API_URL}/uploads/${p.image}" alt="${p.name}">` : ""}

      <div class="card-info">
        <h3>
          <a href="prodotto.html?id=${p.id}">
            ${p.name}
          </a>
        </h3>
        <p class="description">${p.description || ""}</p>
        <p class="price">€${p.price}</p>
      </div>
    </div>
  `).join("");
}

window.onload = loadBrandPage;
  </script>
</body>
</html>
