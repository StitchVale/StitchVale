<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StitchVale Socials</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#000;
      color:white;
      font-family:Arial, sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:500px;
      text-align:center;
    }

    .logo{
      margin-bottom:30px;
    }

    .logo img{
      width:220px;
      border-radius:20px;
    }

    h1{
      font-size:42px;
      margin-bottom:10px;
      letter-spacing:2px;
    }

    p{
      color:#aaa;
      margin-bottom:35px;
      font-size:16px;
    }

    .social-btn{
      display:block;
      width:100%;
      background:#111;
      color:white;
      text-decoration:none;
      padding:18px;
      margin-bottom:18px;
      border-radius:16px;
      border:1px solid #222;
      font-size:18px;
      font-weight:bold;
      transition:0.2s ease;
    }

    .social-btn:hover{
      transform:scale(1.03);
      background:#1c1c1c;
    }

    footer{
      margin-top:30px;
      color:#666;
      font-size:14px;
    }

  </style>
</head>

<body>

  <div class="container">

    <div class="logo">
      <img src="logo1.jpg" alt="StitchVale Logo">
    </div>

    <h1>StitchVale</h1>

    <p>Seguici su tutte le piattaforme.</p>

    <a class="social-btn"
       href="https://www.instagram.com/stitchvale1?igsh=MTA0MTZvanJkbmp1eA%3D%3D&utm_source=qr"
       target="_blank">
       Instagram
    </a>

    <a class="social-btn"
       href="https://www.tiktok.com/@stitchvale1"
       target="_blank">
       TikTok - @StitchVale1
    </a>

    <a class="social-btn"
       href="https://discord.gg/Vjvc96T5F"
       target="_blank">
       Discord
    </a>

    <a class="social-btn"
       href="https://www.youtube.com/@StitchVale"
       target="_blank">
       YouTube
    </a>

    <footer>
      © 2026 StitchVale
    </footer>

  </div>

</body>
</html>
